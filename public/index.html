<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestions d'activités</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #222;
            background-color: #fafafa;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
            margin-bottom: 24px;
            text-align: center;
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            color: #444;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #000;
        }
        button {
            display: block;
            width: 100%;
            padding: 14px;
            background: #111;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #333;
        }
        button:disabled {
            background: #eaeaea;
            color: #999;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
        #results {
            margin-top: 25px;
            padding: 20px;
            background: #fafafa;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            white-space: pre-wrap;
            display: none;
            font-size: 15px;
            color: #333;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Suggestions d'activités</h1>
        <div class="section">
            <label for="prompt">Que souhaitez-vous faire ?</label>
            <textarea id="prompt" placeholder="Ex : j'aimerai écouter de la musique avec des amis samedi soir"></textarea>
        </div>

        <button id="searchBtn">Proposer des idées</button>

        <div id="status"></div>
        <div id="results"></div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');

        searchBtn.onclick = async () => {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) return alert("Veuillez saisir ce que vous souhaitez faire.");

            // UI Reset
            searchBtn.disabled = true;
            resultsDiv.style.display = 'none';
            resultsDiv.textContent = '';
            statusDiv.innerHTML = '<div class="loading-spinner"></div> Connexion en cours...';

            try {
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errMsg = errorText;
                    try {
                        const errJson = JSON.parse(errorText);
                        errMsg = errJson.error || errorText;
                    } catch (_) {}
                    throw new Error(errMsg || `HTTP error! Status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');

                    // The last item in lines is the potentially incomplete line (buffer)
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (!trimmedLine) continue;

                        if (trimmedLine.startsWith('data: ')) {
                            const dataStr = trimmedLine.substring(6).trim();
                            try {
                                const event = JSON.parse(dataStr);
                                if (event.type === 'progress') {
                                    statusDiv.innerHTML = `<div class="loading-spinner"></div> Recherche d'idées en cours...`;
                                } else if (event.type === 'result') {
                                    statusDiv.textContent = 'Suggestions générées !';
                                    resultsDiv.style.display = 'block';
                                    resultsDiv.textContent = event.data.result;
                                } else if (event.type === 'error') {
                                    statusDiv.textContent = '❌ Erreur : ' + event.data.error;
                                }
                            } catch (parseErr) {
                                console.error('Error parsing SSE event:', parseErr, dataStr);
                            }
                        }
                    }
                }

                // Process any leftover content in the buffer
                if (buffer.trim()) {
                    const trimmedLine = buffer.trim();
                    if (trimmedLine.startsWith('data: ')) {
                        const dataStr = trimmedLine.substring(6).trim();
                        try {
                            const event = JSON.parse(dataStr);
                            if (event.type === 'progress') {
                                statusDiv.innerHTML = `<div class="loading-spinner"></div> Recherche d'idées en cours...`;
                            } else if (event.type === 'result') {
                                statusDiv.textContent = 'Suggestions générées !';
                                resultsDiv.style.display = 'block';
                                resultsDiv.textContent = event.data.result;
                            } else if (event.type === 'error') {
                                statusDiv.textContent = '❌ Erreur : ' + event.data.error;
                            }
                        } catch (parseErr) {
                            console.error('Error parsing final SSE event:', parseErr, dataStr);
                        }
                    }
                }
            } catch (err) {
                statusDiv.textContent = "❌ Erreur de connexion.";
                console.error(err);
            } finally {
                searchBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
